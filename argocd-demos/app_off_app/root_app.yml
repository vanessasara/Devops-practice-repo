apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app                # Root application name
  namespace: argocd             # Always in ArgoCD namespace
spec:
  project: default              # Can also assign to a Project if needed
  source:
    repoURL:  https://github.com/vanessasara/Devops-practice-repo.git
    targetRevision: master       # Git branch to track
    path: app_of_app/app   # Path where child app manifests are stored
  destination:
    server:  https://kubernetes.default.svc  # Deploying inside the same cluster
    namespace: argocd             # Applications (CRDs) must live in argocd namespace
  syncPolicy:
    automated:
      prune: true                 # Prune removed child apps
      selfHeal: true              # Auto-fix drift
